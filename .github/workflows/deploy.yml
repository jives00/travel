name: Deploy

on:
  push:
    branches: [main]
    tags: ["apk-*"]

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/jives00/travel-api:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/jives00/travel-web:latest
          build-args: |
            NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY }}

  build-apk:
    if: startsWith(github.ref, 'refs/tags/apk-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Must match the Dockerfiles' pin exactly — a mismatch trips pnpm's
      # supply-chain minimumReleaseAge gate.
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @travel/types build
          pnpm --filter @travel/core build
          pnpm --filter @travel/api-client build
          pnpm --filter @travel/ui-tokens build

      - name: Write mobile .env
        run: |
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" >> apps/mobile/.env
          echo "EXPO_PUBLIC_GOOGLE_MAPS_ANDROID_KEY=${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_ANDROID_KEY }}" >> apps/mobile/.env
          echo "EXPO_PUBLIC_BUILD_TAG=${{ github.ref_name }}" >> apps/mobile/.env

      - name: Prebuild Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      # Injects the ONE persistent release keystore over the auto-generated debug
      # keystore path — never regenerate this, or in-place APK updates on devices
      # break signature verification (see build plan §7).
      - name: Inject signing keystore
        working-directory: apps/mobile
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/debug.keystore

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew app:assembleRelease -x lint -x test -PreactNativeArchitectures=arm64-v8a

      - name: Rename APK with timestamp
        working-directory: apps/mobile/android/app/build/outputs/apk/release
        run: mv app-release.apk "travel-${{ github.ref_name }}-$(date +%Y%m%d%H%M%S).apk"

      - name: Create GitHub release with APK
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/android/app/build/outputs/apk/release/*.apk
